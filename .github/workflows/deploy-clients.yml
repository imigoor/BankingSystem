name: Deploy Clients API

on:
  push:
    branches: [ "main" ]
    paths:
      - 'src/Clients/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Build and Publish
      run: dotnet publish src/Clients/Clients.API/Clients.API.csproj -c Release -o ./publish_clients

    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v3
      with:
        app-name: 'app-clients-api'
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_CLIENTS }}
        package: ./publish_clients
